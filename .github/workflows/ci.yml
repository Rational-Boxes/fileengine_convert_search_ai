name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Reused FileEngine client, if checked out alongside this repo.
          if [ -d ../python_interface ]; then pip install ../python_interface; fi
          pip install -e ".[dev]"

      - name: Lint (compile)
        run: python -m compileall src

      - name: Unit tests
        # @live integration tests skip automatically without LDAP/core.
        run: pytest -q
